name: Build and Deploy to GitHub Pages
on:
  workflow_dispatch
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      VITE_API_WS: ${{ secrets.VITE_API_WS }}
    steps:
      - name: Deploy to GitHub Pages
        run: |
          npm run deploy
